syntax = "proto3";

option java_package = "com.peter.datastore.proto";
option java_multiple_files = true;

message UserPreferences {
    string user_name = 1;
    int32 user_age = 2;
    bool is_logged_in = 3;
    int64 last_login_time = 4;
    repeated string favorite_tags = 5;
    map<string, string> settings = 6;
}

message AppSettings {
    int32 version = 1;
    string theme = 2;
    bool notifications_enabled = 3;
    int32 font_size = 4;
    string language = 5;
}

message ComplexData {
    message Item {
        int32 id = 1;
        string name = 2;
        double value = 3;
        int64 timestamp = 4;
    }
    repeated Item items = 1;
    int32 schema_version = 2;
}
